<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" role="img" aria-label="Same prompt to three parallel agents yields three different prototypes">
  <style>
    .bg{fill:#0b0d10}
    .stroke{stroke:#d1d5db;stroke-width:1.5;fill:none}
    .arrow{stroke:#d1d5db;stroke-width:1.25;fill:none;marker-end:url(#ah)}
    .label{fill:#e5e7eb;font:12px ui-monospace,SFMono-Regular,Menlo,monospace}
    .muted{fill:#9ca3af;font:11px ui-monospace,SFMono-Regular,Menlo,monospace}
    .accent{stroke:#f59e0b;stroke-width:2;fill:none}
    .accent-t{fill:#f59e0b;font:11px ui-monospace,SFMono-Regular,Menlo,monospace}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d1d5db"/>
    </marker>
  </defs>
  <rect class="bg" width="640" height="280"/>

  <rect class="stroke" x="240" y="20" width="160" height="44" rx="4"/>
  <text class="label" x="252" y="47">same prompt x3</text>

  <path class="arrow" d="M320 64 L120 120"/>
  <path class="arrow" d="M320 64 L320 120"/>
  <path class="arrow" d="M320 64 L520 120"/>

  <rect class="stroke" x="60"  y="120" width="130" height="90" rx="4"/>
  <text class="label" x="104" y="146">proto v1</text>
  <text class="muted" x="72"  y="170">hooks approach</text>
  <text class="muted" x="72"  y="188">3 files changed</text>

  <rect class="accent" x="255" y="120" width="130" height="90" rx="4"/>
  <text class="accent-t" x="299" y="146">proto v2</text>
  <text class="muted"   x="267" y="170">reducer approach</text>
  <text class="muted"   x="267" y="188">1 file changed</text>

  <rect class="stroke" x="450" y="120" width="130" height="90" rx="4"/>
  <text class="label" x="494" y="146">proto v3</text>
  <text class="muted" x="462" y="170">context approach</text>
  <text class="muted" x="462" y="188">5 files changed</text>

  <text class="accent-t" x="264" y="248">keep v2, discard the rest</text>
</svg>
