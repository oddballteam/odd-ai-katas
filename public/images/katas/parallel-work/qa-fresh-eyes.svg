<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 240" role="img" aria-label="Writer agent with long context hands diff to reviewer with fresh context">
  <style>
    .bg{fill:#0b0d10}
    .stroke{stroke:#d1d5db;stroke-width:1.5;fill:none}
    .arrow{stroke:#d1d5db;stroke-width:1.25;fill:none;marker-end:url(#ah)}
    .label{fill:#e5e7eb;font:12px ui-monospace,SFMono-Regular,Menlo,monospace}
    .muted{fill:#9ca3af;font:11px ui-monospace,SFMono-Regular,Menlo,monospace}
    .warn{fill:#f59e0b;font:11px ui-monospace,SFMono-Regular,Menlo,monospace}
    .dim{stroke:#6b7280;stroke-width:1.25;fill:none;stroke-dasharray:3 3}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d1d5db"/>
    </marker>
  </defs>
  <rect class="bg" width="640" height="240"/>

  <rect class="stroke" x="30" y="50" width="240" height="140" rx="4"/>
  <text class="label" x="46" y="76">writer agent</text>
  <text class="muted" x="46" y="100">ctx: 47 turns of history</text>
  <text class="muted" x="46" y="120">knows what it meant</text>
  <text class="warn"  x="46" y="144">drifts toward agreement</text>
  <text class="muted" x="46" y="168">wants to be &quot;done&quot;</text>

  <path class="arrow" d="M270 120 L370 120"/>
  <text class="label" x="292" y="112">diff + spec</text>

  <rect class="stroke" x="370" y="50" width="240" height="140" rx="4"/>
  <text class="label" x="386" y="76">reviewer agent</text>
  <text class="muted" x="386" y="100">ctx: diff + spec only</text>
  <text class="muted" x="386" y="120">no prior intent</text>
  <text class="muted" x="386" y="144">told: do not be agreeable</text>
  <text class="warn"  x="386" y="168">the missing context IS the tool</text>
</svg>
