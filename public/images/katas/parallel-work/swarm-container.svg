<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" role="img" aria-label="Multiple accept-all agents running inside a container sandbox, with commits as the only output">
  <style>
    .bg{fill:#0b0d10}
    .stroke{stroke:#d1d5db;stroke-width:1.5;fill:none}
    .dim{stroke:#6b7280;stroke-width:1.25;fill:none;stroke-dasharray:4 4}
    .arrow{stroke:#d1d5db;stroke-width:1.25;fill:none;marker-end:url(#ah)}
    .label{fill:#e5e7eb;font:12px ui-monospace,SFMono-Regular,Menlo,monospace}
    .muted{fill:#9ca3af;font:11px ui-monospace,SFMono-Regular,Menlo,monospace}
    .warn{fill:#f59e0b;font:11px ui-monospace,SFMono-Regular,Menlo,monospace}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d1d5db"/>
    </marker>
  </defs>
  <rect class="bg" width="640" height="300"/>

  <rect class="dim" x="30" y="30" width="420" height="180" rx="6"/>
  <text class="muted" x="46" y="52">container / sandbox VM</text>

  <g>
    <rect class="stroke" x="60"  y="80" width="80" height="40" rx="4"/>
    <text class="label" x="88"  y="104">agent</text>
    <rect class="stroke" x="160" y="80" width="80" height="40" rx="4"/>
    <text class="label" x="188" y="104">agent</text>
    <rect class="stroke" x="260" y="80" width="80" height="40" rx="4"/>
    <text class="label" x="288" y="104">agent</text>
    <rect class="stroke" x="360" y="80" width="80" height="40" rx="4"/>
    <text class="label" x="388" y="104">agent</text>

    <rect class="stroke" x="60"  y="140" width="80" height="40" rx="4"/>
    <text class="label" x="88"  y="164">agent</text>
    <rect class="stroke" x="160" y="140" width="80" height="40" rx="4"/>
    <text class="label" x="188" y="164">agent</text>
    <rect class="stroke" x="260" y="140" width="80" height="40" rx="4"/>
    <text class="label" x="288" y="164">agent</text>
    <rect class="stroke" x="360" y="140" width="80" height="40" rx="4"/>
    <text class="label" x="388" y="164">agent</text>
  </g>

  <text class="warn" x="46" y="200">--dangerously-skip-permissions</text>

  <path class="arrow" d="M450 120 L540 120"/>
  <text class="muted" x="458" y="110">commits</text>

  <rect class="stroke" x="540" y="100" width="80" height="40" rx="4"/>
  <text class="label" x="560" y="124">git log</text>

  <text class="muted" x="30" y="260">host machine: untouched</text>
  <rect class="dim" x="30" y="230" width="580" height="50" rx="6"/>
</svg>
