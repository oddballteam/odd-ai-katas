<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" role="img" aria-label="Orchestrator fans out to four subagents, each with its own context, then merges">
  <style>
    .bg{fill:#0b0d10}
    .stroke{stroke:#d1d5db;stroke-width:1.5;fill:none}
    .arrow{stroke:#d1d5db;stroke-width:1.25;fill:none;marker-end:url(#ah)}
    .label{fill:#e5e7eb;font:12px ui-monospace,SFMono-Regular,Menlo,monospace}
    .muted{fill:#9ca3af;font:10px ui-monospace,SFMono-Regular,Menlo,monospace}
    .accent{fill:#f59e0b;font:11px ui-monospace,SFMono-Regular,Menlo,monospace}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d1d5db"/>
    </marker>
  </defs>
  <rect class="bg" width="640" height="300"/>

  <rect class="stroke" x="250" y="20" width="140" height="44" rx="4"/>
  <text class="label" x="280" y="47">orchestrator</text>

  <path class="arrow" d="M320 64 L100 130"/>
  <path class="arrow" d="M320 64 L250 130"/>
  <path class="arrow" d="M320 64 L390 130"/>
  <path class="arrow" d="M320 64 L540 130"/>

  <g>
    <rect class="stroke" x="40"  y="130" width="120" height="70" rx="4"/>
    <text class="label" x="68" y="156">subagent</text>
    <text class="muted" x="58" y="180">own ctx window</text>
  </g>
  <g>
    <rect class="stroke" x="190" y="130" width="120" height="70" rx="4"/>
    <text class="label" x="218" y="156">subagent</text>
    <text class="muted" x="208" y="180">own ctx window</text>
  </g>
  <g>
    <rect class="stroke" x="330" y="130" width="120" height="70" rx="4"/>
    <text class="label" x="358" y="156">subagent</text>
    <text class="muted" x="348" y="180">own ctx window</text>
  </g>
  <g>
    <rect class="stroke" x="480" y="130" width="120" height="70" rx="4"/>
    <text class="label" x="508" y="156">subagent</text>
    <text class="muted" x="498" y="180">own ctx window</text>
  </g>

  <path class="arrow" d="M100 200 L320 246"/>
  <path class="arrow" d="M250 200 L320 246"/>
  <path class="arrow" d="M390 200 L320 246"/>
  <path class="arrow" d="M540 200 L320 246"/>

  <rect class="stroke" x="240" y="246" width="160" height="40" rx="4"/>
  <text class="accent" x="274" y="271">merged summary</text>
</svg>
